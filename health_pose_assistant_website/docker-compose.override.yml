services:
  backend:
    environment:
      - DATABASE_URL=${HOST_DATABASE_URL:-postgresql://hpa_user:hpa_pass@host.docker.internal:5432/health_pose_assistant}
      - DB_HOST=${HOST_DB_HOST:-host.docker.internal}
      - DB_PORT=${HOST_DB_PORT:-5432}
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Remove dependency on the compose `db` service so the backend
    # can be started independently and connect to the host Postgres.
    depends_on: []
